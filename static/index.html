<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ADAM - Robot Brain Interface</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg: #09090f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #00ff88;
    --accent2: #7c3aed;
    --text: #e2e8f0;
    --muted: #4a4a6a;
    --danger: #ff4466;
    --panel-w: 340px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    height: 52px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    z-index: 10;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.2rem;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
  }

  .logo span { color: var(--muted); font-weight: 400; font-size: 0.75rem; margin-left: 12px; letter-spacing: 0.05em; }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  .status-dot.connected { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .status-dot.thinking { background: #ffaa00; box-shadow: 0 0 8px #ffaa00; animation: pulse 0.8s infinite; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── Main layout ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Canvas area ── */
  #canvas-wrap {
    flex: 1;
    position: relative;
    background: radial-gradient(ellipse at 50% 60%, #0d0d1f 0%, var(--bg) 70%);
  }

  #three-canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* grid overlay */
  #canvas-wrap::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.3;
    pointer-events: none;
  }

  /* corner labels */
  .corner-label {
    position: absolute;
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.15em;
  }
  .corner-label.tl { top: 16px; left: 16px; }
  .corner-label.tr { top: 16px; right: 16px; }
  .corner-label.bl { bottom: 16px; left: 16px; }
  .corner-label.br { bottom: 16px; right: 16px; }

  /* motion label */
  #motion-label {
    position: absolute;
    bottom: 48px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    padding: 8px 16px;
    font-size: 0.75rem;
    color: var(--accent);
    letter-spacing: 0.1em;
    opacity: 0;
    transition: opacity 0.4s;
    white-space: nowrap;
  }
  #motion-label.visible { opacity: 1; }

  /* ── Right panel ── */
  .panel {
    width: var(--panel-w);
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    position: relative;
  }

  .panel::before {
    content: '';
    position: absolute;
    inset: 0;
    background: url('/static/assets/ainetic.gif') center/cover no-repeat;
    opacity: 0.12;
    pointer-events: none;
    z-index: 0;
  }

  .panel > * {
    position: relative;
    z-index: 1;
  }

  .panel-section {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }

  .section-label {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  /* ── Command log ── */
  #log {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .log-entry {
    font-size: 0.72rem;
    line-height: 1.5;
    padding: 8px 10px;
    border-radius: 2px;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }

  .log-entry.user {
    background: rgba(124,58,237,0.12);
    border-left: 2px solid var(--accent2);
    color: #c4b5fd;
  }

  .log-entry.robot {
    background: rgba(0,255,136,0.06);
    border-left: 2px solid var(--accent);
    color: var(--accent);
  }

  .log-entry.error {
    background: rgba(255,68,102,0.08);
    border-left: 2px solid var(--danger);
    color: var(--danger);
  }

  .log-entry.system {
    color: var(--muted);
    font-style: italic;
    font-size: 0.65rem;
  }



  /* ── Input area ── */
  .input-area {
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    border-top: 1px solid var(--border);
  }

  #cmd-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    padding: 10px 12px;
    resize: none;
    outline: none;
    border-radius: 2px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }
  #cmd-input:focus { border-color: var(--accent); }
  #cmd-input::placeholder { color: var(--muted); }

  .btn-row { display: flex; gap: 8px; }

  button {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    padding: 8px 14px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
    text-transform: uppercase;
  }

  #send-btn {
    flex: 1;
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
    font-weight: 700;
  }
  #send-btn:hover { background: #00cc6a; }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  #reset-btn:hover { border-color: var(--danger); color: var(--danger); }

  /* ── Quick commands ── */
  .quick-cmds {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }

  .quick-btn {
    font-size: 0.6rem;
    padding: 5px 10px;
    border-color: var(--border);
  }
  .quick-btn:hover { border-color: var(--accent2); color: #c4b5fd; }

</style>
</head>
<body>

<header>
  <div class="logo">ADAM <span>/ Neural Motor Interface</span></div>
  <div class="status-pill">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">DISCONNECTED</span>
  </div>
</header>

<div class="main">

  <!-- 3D Viewport -->
  <div id="canvas-wrap">
    <canvas id="three-canvas"></canvas>
    <div class="corner-label tl">VIEW / PERSPECTIVE</div>
    <div class="corner-label tr" id="fps-label">-- FPS</div>
    <div class="corner-label bl">DRAG TO ORBIT · SCROLL TO ZOOM</div>
    <div class="corner-label br" id="keyframe-label">FRAME --/--</div>
    <div id="motion-label">IDLE</div>
  </div>

  <!-- Right Panel -->
  <div class="panel">

    <!-- quick commands -->
    <div class="quick-cmds">
      <div class="section-label" style="width:100%;margin-bottom:4px">Quick commands</div>
      <button class="quick-btn" onclick="quickSend('wave your right hand')">Wave</button>
      <button class="quick-btn" onclick="quickSend('jump')">Jump</button>
      <button class="quick-btn" onclick="quickSend('bend down and touch the floor')">Bend</button>
      <button class="quick-btn" onclick="quickSend('walk in place')">Walk</button>
      <button class="quick-btn" onclick="quickSend('roll your head slowly')">Head roll</button>
      <button class="quick-btn" onclick="quickSend('do a T-pose')">T-Pose</button>
      <button class="quick-btn" onclick="quickSend('raise both arms above your head')">Arms up</button>
      <button class="quick-btn" onclick="quickSend('idle breathing')">Idle</button>
    </div>

    <!-- log -->
    <div class="panel-section" style="padding-bottom:6px">
      <div class="section-label">Command log</div>
    </div>
    <div id="log">
      <div class="log-entry system">Awaiting connection...</div>
    </div>

    <!-- input -->
    <div class="input-area">
      <textarea id="cmd-input" rows="2" placeholder="Tell the robot what to do..."></textarea>
      <div class="btn-row">
        <button id="reset-btn" onclick="resetPose()">Reset</button>
        <button id="send-btn" onclick="sendCommand()">Send ↵</button>
      </div>
    </div>

  </div>
</div>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
// ─────────────────────────────────────────────
// Model config — change this path to switch models
// ─────────────────────────────────────────────
const MODEL_PATH = '/static/models/xbot.glb';

// ─────────────────────────────────────────────
// Three.js scene setup
// ─────────────────────────────────────────────
const canvas = document.getElementById('three-canvas');
const wrap = document.getElementById('canvas-wrap');

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(45, 1, 0.01, 100);
camera.position.set(0, 1.6, 3.2);
camera.lookAt(0, 1, 0);

// Lights
const ambient = new THREE.AmbientLight(0x8888ff, 0.4);
scene.add(ambient);

const keyLight = new THREE.DirectionalLight(0xffffff, 1.2);
keyLight.position.set(2, 5, 3);
keyLight.castShadow = true;
scene.add(keyLight);

const rimLight = new THREE.DirectionalLight(0x00ff88, 0.4);
rimLight.position.set(-3, 3, -2);
scene.add(rimLight);

const fillLight = new THREE.PointLight(0x7c3aed, 0.6, 8);
fillLight.position.set(-1.5, 1, 1);
scene.add(fillLight);

// Floor
const floorGeo = new THREE.PlaneGeometry(10, 10);
const floorMat = new THREE.MeshStandardMaterial({ color: 0x0a0a12, roughness: 1 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

// ─────────────────────────────────────────────
// Bone references
// ─────────────────────────────────────────────
const boneObjects = {};
const boneRestQuaternions = {};
const boneRestPositions = {};

const KNOWN_BONES = [
  'Hips', 'Spine', 'Spine1', 'Spine2', 'Neck', 'Head',
  'LeftShoulder', 'LeftArm', 'LeftForeArm', 'LeftHand',
  'RightShoulder', 'RightArm', 'RightForeArm', 'RightHand',
  'LeftUpLeg', 'LeftLeg', 'LeftFoot', 'LeftToeBase',
  'RightUpLeg', 'RightLeg', 'RightFoot', 'RightToeBase',
];

const SPINE_CHAIN = ['Spine', 'Spine1', 'Spine2'];
const HEAD_CHAIN  = ['Neck', 'Head'];

// Follow-through — world-space lag storage (spine + head lag by one frame)
const _prevBoneQuat = {};
const FOLLOW_THROUGH_DAMP = 0.15;

// Rest hips Y (set after model loaded)
let restHipsY = 0;

// ─────────────────────────────────────────────
// Load GLTF humanoid model (Mixamo Xbot)
// ─────────────────────────────────────────────
const gltfLoader = new THREE.GLTFLoader();
console.log('[ADAM] Loading model...');
gltfLoader.load(MODEL_PATH, function(gltf) {
  const model = gltf.scene;
  const allBoneNames = [];
  model.traverse(function(obj) {
    if (obj.isMesh) {
      obj.castShadow = true;
      obj.receiveShadow = true;
    }
    if (obj.isBone || obj.type === 'Bone') {
      allBoneNames.push(obj.name);
      let name = obj.name;
      if (name.startsWith('mixamorig')) name = name.slice('mixamorig'.length);
      if (KNOWN_BONES.includes(name)) {
        boneObjects[name] = obj;
        boneRestQuaternions[name] = obj.quaternion.clone();
        boneRestPositions[name]   = obj.position.clone();
      }
    }
  });
  scene.add(model);

  // Store rest hips Y
  if (boneObjects['Hips']) {
    const wp = new THREE.Vector3();
    boneObjects['Hips'].getWorldPosition(wp);
    restHipsY = wp.y;
  }

  // Init follow-through prev quats
  for (const name of [...SPINE_CHAIN, ...HEAD_CHAIN]) {
    if (boneObjects[name]) _prevBoneQuat[name] = boneObjects[name].quaternion.clone();
  }

  console.log('[ADAM] Mapped bones:', Object.keys(boneObjects).length, '/', allBoneNames.length);
  logEntry('system', 'Model loaded — ' + Object.keys(boneObjects).length + '/' + allBoneNames.length + ' bones mapped.');
}, undefined, function(err) {
  console.error('[ADAM] Model load error:', err);
  logEntry('error', 'Failed to load model: ' + (err.message || err));
});

// ─────────────────────────────────────────────
// Math helpers
// ─────────────────────────────────────────────
function offsetQuat(rx, ry, rz) {
  const euler = new THREE.Euler(
    THREE.MathUtils.degToRad(rx),
    THREE.MathUtils.degToRad(ry),
    THREE.MathUtils.degToRad(rz),
    'XYZ'
  );
  return new THREE.Quaternion().setFromEuler(euler);
}

function smoothstep(t) {
  t = Math.max(0, Math.min(1, t));
  return t * t * (3 - 2 * t);
}

// ─────────────────────────────────────────────
// Orbit controls
// ─────────────────────────────────────────────
let isDragging = false, lastX = 0, lastY = 0;
let orbitTheta = 0, orbitPhi = Math.PI / 8, orbitRadius = 3.2;
const orbitTarget = new THREE.Vector3(0, 1, 0);

canvas.addEventListener('mousedown', e => { isDragging = true; lastX = e.clientX; lastY = e.clientY; });
window.addEventListener('mouseup', () => isDragging = false);
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  orbitTheta -= (e.clientX - lastX) * 0.01;
  orbitPhi   -= (e.clientY - lastY) * 0.005;
  orbitPhi    = Math.max(0.1, Math.min(Math.PI / 2, orbitPhi));
  lastX = e.clientX; lastY = e.clientY;
  updateCamera();
});
canvas.addEventListener('wheel', e => {
  orbitRadius = Math.max(1.5, Math.min(6, orbitRadius + e.deltaY * 0.005));
  updateCamera();
});

function updateCamera() {
  camera.position.set(
    orbitTarget.x + orbitRadius * Math.sin(orbitPhi) * Math.sin(orbitTheta),
    orbitTarget.y + orbitRadius * Math.cos(orbitPhi),
    orbitTarget.z + orbitRadius * Math.sin(orbitPhi) * Math.cos(orbitTheta)
  );
  camera.lookAt(orbitTarget);
}

// ─────────────────────────────────────────────
// Two-bone IK foot planting
// ─────────────────────────────────────────────
const _ikScratch = {
  upper: new THREE.Vector3(),
  lower: new THREE.Vector3(),
  foot:  new THREE.Vector3(),
  target: new THREE.Vector3(),
};

function groundFoot(footName, lowerName, upperName) {
  const upperBone = boneObjects[upperName];
  const lowerBone = boneObjects[lowerName];
  const footBone  = boneObjects[footName];
  if (!upperBone || !lowerBone || !footBone) return;

  footBone.getWorldPosition(_ikScratch.foot);
  if (_ikScratch.foot.y <= 0.01) return; // already grounded

  // Target is foot projected to y=0
  _ikScratch.target.copy(_ikScratch.foot).setY(0);

  upperBone.getWorldPosition(_ikScratch.upper);
  lowerBone.getWorldPosition(_ikScratch.lower);

  const L1 = _ikScratch.upper.distanceTo(_ikScratch.lower);
  const L2 = _ikScratch.lower.distanceTo(_ikScratch.foot);
  const D  = _ikScratch.upper.distanceTo(_ikScratch.target);

  // Law of cosines — angle at upper joint
  const cosA = Math.max(-1, Math.min(1, (L1 * L1 + D * D - L2 * L2) / (2 * L1 * D)));
  const A = Math.acos(cosA);

  // Direction from upper to target
  const dir = _ikScratch.target.clone().sub(_ikScratch.upper).normalize();

  // Rotate upper bone by A around its local X
  const correction = new THREE.Quaternion().setFromAxisAngle(
    new THREE.Vector3(1, 0, 0).applyQuaternion(upperBone.quaternion),
    A
  );
  upperBone.quaternion.premultiply(correction);

  // Clamp Hips y so it doesn't go below restHipsY - 0.05
  if (boneObjects['Hips']) {
    const hp = new THREE.Vector3();
    boneObjects['Hips'].getWorldPosition(hp);
    if (hp.y < restHipsY - 0.05) {
      const diff = restHipsY - 0.05 - hp.y;
      boneObjects['Hips'].position.y += diff;
    }
  }
}

// ─────────────────────────────────────────────
// Follow-through pass
// ─────────────────────────────────────────────
function applyFollowThrough() {
  for (const name of [...SPINE_CHAIN, ...HEAD_CHAIN]) {
    const bone = boneObjects[name];
    if (!bone) continue;
    if (!_prevBoneQuat[name]) { _prevBoneQuat[name] = bone.quaternion.clone(); continue; }
    // Lag: blend current toward previous (lagging behind)
    const lagged = _prevBoneQuat[name].clone().slerp(bone.quaternion, 1 - FOLLOW_THROUGH_DAMP);
    _prevBoneQuat[name].copy(bone.quaternion);
    bone.quaternion.copy(lagged);
  }
}

// ─────────────────────────────────────────────
// Animation engine
// ─────────────────────────────────────────────
let animStartTime   = null;
let animLoop        = false;
let animDuration    = 1;
let currentKeyframes = [];

function applyBoneRotations(bones) {
  for (const b of bones) {
    const obj = boneObjects[b.name];
    if (!obj) continue;
    const rest = boneRestQuaternions[b.name];
    const r = b.rotation || {};
    const offset = offsetQuat(r.x || 0, r.y || 0, r.z || 0);
    obj.quaternion.copy(rest).multiply(offset);
  }
}

/**
 * Slerp between two keyframes using quaternion interpolation + smoothstep easing.
 */
function slerpBoneRotations(kfA, kfB, rawT) {
  const t = smoothstep(rawT);
  const mapA = Object.fromEntries(kfA.bones.map(b => [b.name, b.rotation || {}]));
  const mapB = Object.fromEntries(kfB.bones.map(b => [b.name, b.rotation || {}]));
  const allNames = [...new Set([...Object.keys(mapA), ...Object.keys(mapB)])];

  for (const name of allNames) {
    const obj = boneObjects[name];
    if (!obj) continue;
    const rest = boneRestQuaternions[name];
    const rA = mapA[name] || {};
    const rB = mapB[name] || {};
    const qA = rest.clone().multiply(offsetQuat(rA.x || 0, rA.y || 0, rA.z || 0));
    const qB = rest.clone().multiply(offsetQuat(rB.x || 0, rB.y || 0, rB.z || 0));
    obj.quaternion.copy(qA).slerp(qB, t);
  }
}

function tickAnimation(now) {
  if (!currentKeyframes.length) return;
  if (!animStartTime) animStartTime = now;
  let elapsed = (now - animStartTime) / 1000;

  if (animLoop) elapsed = elapsed % animDuration;
  else elapsed = Math.min(elapsed, animDuration);

  const kfs = currentKeyframes;
  let kfBIdx = kfs.findIndex(k => k.time > elapsed);
  if (kfBIdx === -1) kfBIdx = kfs.length - 1;
  const kfAIdx = Math.max(0, kfBIdx - 1);
  const kfA = kfs[kfAIdx];
  const kfB = kfs[kfBIdx];

  if (kfA === kfB) {
    applyBoneRotations(kfA.bones);
  } else {
    const span = kfB.time - kfA.time;
    const t = span === 0 ? 0 : (elapsed - kfA.time) / span;
    slerpBoneRotations(kfA, kfB, Math.min(1, Math.max(0, t)));
  }

  // Gravity / foot planting — only when kfB.grounded is not explicitly false
  if (kfB.grounded !== false) {
    groundFoot('LeftFoot',  'LeftLeg',  'LeftUpLeg');
    groundFoot('RightFoot', 'RightLeg', 'RightUpLeg');
  }

  // Follow-through pass on spine + head
  applyFollowThrough();

  document.getElementById('keyframe-label').textContent = `KF ${kfBIdx + 1}/${kfs.length}`;
}

function playMotion(motion) {
  currentKeyframes = motion.keyframes || [];
  animLoop         = motion.loop || false;
  animDuration     = motion.totalDuration || 1;
  animStartTime    = null;

  const label = document.getElementById('motion-label');
  label.textContent = (motion.description || 'EXECUTING').toUpperCase();
  label.classList.add('visible');
  setTimeout(() => label.classList.remove('visible'), 3000);
}

function resetPose() {
  currentKeyframes = [];
  animStartTime    = null;
  for (const [name, obj] of Object.entries(boneObjects)) {
    obj.quaternion.copy(boneRestQuaternions[name]);
    obj.position.copy(boneRestPositions[name]);
  }
  document.getElementById('keyframe-label').textContent = 'FRAME --/--';
  logEntry('system', 'Pose reset to neutral.');
}

// ─────────────────────────────────────────────
// Render loop
// ─────────────────────────────────────────────
let frameCount = 0, lastFPSTime = performance.now();

function resize() {
  const w = wrap.clientWidth, h = wrap.clientHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
resize();
window.addEventListener('resize', resize);

function animate(now) {
  requestAnimationFrame(animate);
  tickAnimation(now);
  renderer.render(scene, camera);
  frameCount++;
  if (now - lastFPSTime > 1000) {
    document.getElementById('fps-label').textContent = `${frameCount} FPS`;
    frameCount = 0;
    lastFPSTime = now;
  }
}
animate(performance.now());

// ─────────────────────────────────────────────
// WebSocket — versioned protocol v1
// ─────────────────────────────────────────────
let ws = null;
let _sessionId = localStorage.getItem('adam_session') || null;
let _reconnectDelay = 1000;
let _pingInterval = null;
let _inFlight = false;
let _pendingCommand = null; // debounce: queue depth 1

function _newMsgId() {
  return typeof crypto.randomUUID === 'function'
    ? crypto.randomUUID()
    : Math.random().toString(36).slice(2);
}

function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);

  ws.onopen = () => {
    setStatus('connected', 'CONNECTED');
    _reconnectDelay = 1000;

    // Resume previous session if available
    if (_sessionId) {
      ws.send(JSON.stringify({ v: 1, type: 'resume', session_id: _sessionId }));
    }

    // Client-side keepalive ping every 20 s
    _pingInterval = setInterval(() => {
      if (ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ v: 1, type: 'ping' }));
    }, 20000);
  };

  ws.onclose = () => {
    setStatus('', 'DISCONNECTED');
    clearInterval(_pingInterval);
    _inFlight = false;
    setSendEnabled(true);
    setTimeout(connectWS, _reconnectDelay);
    _reconnectDelay = Math.min(_reconnectDelay * 2, 16000);
  };

  ws.onerror = () => {
    setStatus('', 'ERROR');
  };

  ws.onmessage = e => {
    let msg;
    try { msg = JSON.parse(e.data); } catch { return; }

    switch (msg.type) {
      case 'session':
        _sessionId = msg.id;
        localStorage.setItem('adam_session', _sessionId);
        logEntry('system', `Session: ${_sessionId.slice(0, 8)}…`);
        break;

      case 'ack':
        // Command acknowledged by server
        break;

      case 'thinking':
        setStatus('thinking', 'THINKING');
        break;

      case 'token':
        // streaming token — no UI update needed here
        break;

      case 'motion': {
        setStatus('connected', 'CONNECTED');
        _inFlight = false;
        setSendEnabled(true);
        const m = msg.motion;
        logEntry('robot', `▶ ${m.description || 'motion received'} · ${m.keyframes?.length || 0} keyframes · loop:${m.loop}`);
        playMotion(m);
        // Flush pending command
        if (_pendingCommand) {
          const next = _pendingCommand;
          _pendingCommand = null;
          _dispatchCommand(next);
        }
        break;
      }

      case 'error':
        setStatus('connected', 'CONNECTED');
        _inFlight = false;
        setSendEnabled(true);
        logEntry('error', `Error [${msg.code || '?'}]: ${msg.message || 'Unknown error'}`);
        if (_pendingCommand) {
          const next = _pendingCommand;
          _pendingCommand = null;
          _dispatchCommand(next);
        }
        break;

      case 'ping':
        if (ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ v: 1, type: 'pong' }));
        break;

      case 'pong':
        break;
    }
  };
}

connectWS();

// ─────────────────────────────────────────────
// UI helpers
// ─────────────────────────────────────────────
function setStatus(cls, text) {
  const dot  = document.getElementById('status-dot');
  const span = document.getElementById('status-text');
  dot.className = 'status-dot ' + cls;
  span.textContent = text;
}

function setSendEnabled(v) {
  document.getElementById('send-btn').disabled = !v;
}

function logEntry(type, text) {
  const logEl = document.getElementById('log');
  const div = document.createElement('div');
  div.className = `log-entry ${type}`;
  div.textContent = text;
  logEl.appendChild(div);
  logEl.scrollTop = logEl.scrollHeight;
}

function _dispatchCommand(cmd) {
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    logEntry('error', 'Not connected.');
    return;
  }
  _inFlight = true;
  setSendEnabled(false);
  setStatus('thinking', 'THINKING');
  ws.send(JSON.stringify({ v: 1, id: _newMsgId(), type: 'command', command: cmd }));
}

function sendCommand() {
  const input = document.getElementById('cmd-input');
  const cmd = input.value.trim();
  if (!cmd) return;
  input.value = '';
  logEntry('user', `> ${cmd}`);

  if (_inFlight) {
    // Debounce: hold as pending, replacing any previous pending
    _pendingCommand = cmd;
    logEntry('system', 'Queued (will send after current response).');
    return;
  }
  _dispatchCommand(cmd);
}

function quickSend(cmd) {
  document.getElementById('cmd-input').value = cmd;
  sendCommand();
}

// Enter to send
document.getElementById('cmd-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendCommand(); }
});
</script>
